<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wind & Solar Nodes</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css"/>
</head>

<body>    
<div id="map" style="width: 100%; height: 100vh;">    
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>
<script>
var map = L.map('map').setView([39.5, -93.5], 5);  
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
}).addTo(map);
function getIcon(node) {
    var emoji = node['Energy Source Code'] === 'WND' ? '💨' : '☀️';
    return L.divIcon({
        className: '',
        html: '<div style="font-size:16px;">' + emoji + '</div>'
    });
}
fetch('data/nodes.json')
  .then(function(response) {
    return response.json();
  })
  .then(function(data) {
    var clusters = L.markerClusterGroup();  // one basket
    data.forEach(function(node){
        var marker = L.marker([node.Latitude, node.Longitude], {icon: getIcon(node)});
        marker.bindPopup(
          `Plant ID: ${node['Plant ID']} <br>
           Plant Name: ${node['Plant Name']} <br> 
           Plant State: ${node['Plant State']} <br>
           County:${node['County']} <br> 
           Balancing Authority Code:${node['Balancing Authority Code']} <br> 
           Generator ID: ${node['Generator ID']} <br>
           Nameplate Capacity (MW): ${node['Nameplate Capacity (MW)']} <br>
           Energy Source Code: ${node['Energy Source Code']} <br>
           Operating Month: ${node['Operating Month']} <br>
           Operating Year: ${node['Operating Year']} <br>
           Latitude: ${node['Latitude']} <br>
           Longitude: ${node['Longitude']}` 
        );
        clusters.addLayer(marker);          // put each apple in basket
    });
        clusters.addTo(map);
    
  });
</script>

</body>
</html>
